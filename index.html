<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaKeke.Sunnyside | Elite Pastry Bidding</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { sunnyside: '#FF8C00', gold: '#D4AF37', onyx: '#050505' },
                    fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-onyx text-white font-sans">

    <div class="fixed inset-0 -z-10 overflow-hidden">
        <video autoplay loop muted playsinline class="w-full h-full object-cover opacity-30">
            <source src="public/background.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-gradient-to-b from-onyx/90 via-transparent to-onyx"></div>
    </div>

    <nav class="fixed top-0 w-full z-50 p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass rounded-full px-8 py-4 border border-white/10">
            <h1 class="font-serif text-2xl font-bold italic tracking-tighter text-gold">MaKeke.S</h1>
            <div id="auth-section" class="flex gap-4 items-center">
                <button onclick="showModal('auth-modal')" class="text-xs uppercase tracking-widest hover:text-gold transition">Login</button>
            </div>
        </div>
    </nav>

    <main class="pt-32 px-6 max-w-7xl mx-auto">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h2 class="text-5xl font-serif mb-2">Live <span class="text-gold">Commissions</span></h2>
                <p class="text-white/40 italic">Real-time bidding between master bakers and visionaries.</p>
            </div>
            <button onclick="showModal('request-modal')" class="bg-gold text-black font-bold px-8 py-3 rounded-xl shadow-lg hover:scale-105 transition-transform">
                Post Request
            </button>
        </header>

        <div id="bidding-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20">
            </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
